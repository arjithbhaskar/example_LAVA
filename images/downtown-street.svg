<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3ecdc"/>
      <stop offset="100%" stop-color="#e8d9b8"/>
    </linearGradient>
    <linearGradient id="streetA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c8e74"/>
      <stop offset="100%" stop-color="#7a6f5a"/>
    </linearGradient>
    <linearGradient id="shopA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4633a"/>
      <stop offset="100%" stop-color="#a04f2c"/>
    </linearGradient>
    <linearGradient id="shopB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f5d3f"/>
      <stop offset="100%" stop-color="#1f3f2a"/>
    </linearGradient>
    <linearGradient id="shopC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c69749"/>
      <stop offset="100%" stop-color="#a07a2c"/>
    </linearGradient>
    <pattern id="brick" x="0" y="0" width="20" height="10" patternUnits="userSpaceOnUse">
      <rect width="20" height="10" fill="#b08767"/>
      <line x1="0" y1="5" x2="20" y2="5" stroke="#9a7456" stroke-width="0.5"/>
      <line x1="10" y1="0" x2="10" y2="5" stroke="#9a7456" stroke-width="0.5"/>
      <line x1="0" y1="10" x2="0" y2="5" stroke="#9a7456" stroke-width="0.5"/>
      <line x1="20" y1="10" x2="20" y2="5" stroke="#9a7456" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="600" height="500" fill="url(#skyA)"/>

  <!-- Distant hills -->
  <path d="M0,420 Q150,360 300,400 T600,380 L600,500 L0,500 Z" fill="#6b8e5a" opacity="0.4"/>
  <path d="M0,450 Q200,400 400,430 T600,420 L600,500 L0,500 Z" fill="#6b8e5a" opacity="0.5"/>

  <!-- Buildings -->
  <!-- Shop 1: brick storefront -->
  <rect x="20" y="200" width="160" height="300" fill="url(#brick)"/>
  <rect x="20" y="200" width="160" height="20" fill="#c4633a"/>
  <rect x="35" y="240" width="50" height="80" fill="#1a2820" opacity="0.7"/>
  <rect x="35" y="240" width="50" height="80" fill="none" stroke="#faf6ee" stroke-width="2"/>
  <line x1="60" y1="240" x2="60" y2="320" stroke="#faf6ee" stroke-width="1"/>
  <line x1="35" y1="280" x2="85" y2="280" stroke="#faf6ee" stroke-width="1"/>
  <rect x="100" y="240" width="60" height="80" fill="#1a2820" opacity="0.7"/>
  <rect x="100" y="240" width="60" height="80" fill="none" stroke="#faf6ee" stroke-width="2"/>
  <rect x="35" y="350" width="50" height="100" fill="#3a2818"/>
  <rect x="35" y="350" width="50" height="100" fill="none" stroke="#faf6ee" stroke-width="1.5"/>
  <rect x="100" y="350" width="60" height="100" fill="#1a2820" opacity="0.6"/>
  <rect x="100" y="350" width="60" height="100" fill="none" stroke="#faf6ee" stroke-width="1.5"/>
  <text x="100" y="215" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#faf6ee">VILLAGE GOODS</text>

  <!-- Shop 2: green storefront -->
  <rect x="200" y="170" width="180" height="330" fill="url(#shopB)"/>
  <rect x="200" y="170" width="180" height="25" fill="#c69749"/>
  <text x="290" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#1f3f2a" letter-spacing="2">EST. 1963</text>
  <!-- Awning -->
  <path d="M195,220 L385,220 L375,250 L205,250 Z" fill="#c4633a"/>
  <path d="M205,220 L205,250 M225,220 L225,250 M245,220 L245,250 M265,220 L265,250 M285,220 L285,250 M305,220 L305,250 M325,220 L325,250 M345,220 L345,250 M365,220 L365,250" stroke="#a04f2c" stroke-width="1.5"/>
  <rect x="215" y="270" width="70" height="100" fill="#faf6ee" opacity="0.9"/>
  <rect x="215" y="270" width="70" height="100" fill="none" stroke="#c69749" stroke-width="2"/>
  <rect x="295" y="270" width="70" height="100" fill="#faf6ee" opacity="0.9"/>
  <rect x="295" y="270" width="70" height="100" fill="none" stroke="#c69749" stroke-width="2"/>
  <rect x="220" y="400" width="60" height="80" fill="#1f3f2a"/>
  <rect x="220" y="400" width="60" height="80" fill="none" stroke="#c69749" stroke-width="1.5"/>
  <circle cx="270" cy="440" r="2" fill="#c69749"/>

  <!-- Shop 3: cream/gold storefront -->
  <rect x="400" y="190" width="180" height="310" fill="#faf6ee"/>
  <rect x="400" y="190" width="180" height="30" fill="url(#shopC)"/>
  <text x="490" y="210" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#1a2820">Maison</text>
  <rect x="415" y="245" width="65" height="90" fill="#c4633a" opacity="0.3"/>
  <rect x="415" y="245" width="65" height="90" fill="none" stroke="#a07a2c" stroke-width="2"/>
  <rect x="500" y="245" width="65" height="90" fill="#c4633a" opacity="0.3"/>
  <rect x="500" y="245" width="65" height="90" fill="none" stroke="#a07a2c" stroke-width="2"/>
  <rect x="450" y="370" width="80" height="130" fill="#a07a2c"/>
  <circle cx="520" cy="435" r="3" fill="#1a2820"/>

  <!-- Sidewalk & street -->
  <rect x="0" y="500" width="600" height="40" fill="#d9cfba"/>
  <rect x="0" y="540" width="600" height="210" fill="url(#streetA)"/>
  <!-- Street markings -->
  <rect x="50" y="640" width="40" height="6" fill="#faf6ee" opacity="0.6"/>
  <rect x="130" y="640" width="40" height="6" fill="#faf6ee" opacity="0.6"/>
  <rect x="210" y="640" width="40" height="6" fill="#faf6ee" opacity="0.6"/>
  <rect x="290" y="640" width="40" height="6" fill="#faf6ee" opacity="0.6"/>
  <rect x="370" y="640" width="40" height="6" fill="#faf6ee" opacity="0.6"/>
  <rect x="450" y="640" width="40" height="6" fill="#faf6ee" opacity="0.6"/>
  <rect x="530" y="640" width="40" height="6" fill="#faf6ee" opacity="0.6"/>

  <!-- Trees (planters) -->
  <g transform="translate(190, 380)">
    <rect x="-15" y="120" width="30" height="20" fill="#a07a2c"/>
    <rect x="-3" y="40" width="6" height="80" fill="#5a3e22"/>
    <circle cx="0" cy="30" r="40" fill="#2f5d3f"/>
    <circle cx="-20" cy="20" r="28" fill="#3a6e4c"/>
    <circle cx="20" cy="25" r="30" fill="#3a6e4c"/>
    <circle cx="0" cy="0" r="32" fill="#6b8e5a"/>
  </g>
  <g transform="translate(390, 410)">
    <rect x="-15" y="90" width="30" height="20" fill="#a07a2c"/>
    <rect x="-3" y="20" width="6" height="70" fill="#5a3e22"/>
    <circle cx="0" cy="10" r="35" fill="#2f5d3f"/>
    <circle cx="-18" cy="0" r="25" fill="#3a6e4c"/>
    <circle cx="18" cy="5" r="27" fill="#3a6e4c"/>
  </g>

  <!-- Flowerpots -->
  <g transform="translate(120, 530)">
    <path d="M-15,0 L15,0 L12,25 L-12,25 Z" fill="#a07a2c"/>
    <circle cx="-8" cy="-3" r="4" fill="#c4633a"/>
    <circle cx="0" cy="-7" r="5" fill="#c69749"/>
    <circle cx="8" cy="-3" r="4" fill="#c4633a"/>
    <circle cx="-3" cy="-1" r="3" fill="#6b8e5a"/>
  </g>
  <g transform="translate(450, 530)">
    <path d="M-15,0 L15,0 L12,25 L-12,25 Z" fill="#a07a2c"/>
    <circle cx="-8" cy="-3" r="4" fill="#c69749"/>
    <circle cx="0" cy="-7" r="5" fill="#c4633a"/>
    <circle cx="8" cy="-3" r="4" fill="#c69749"/>
  </g>

  <!-- Lamppost -->
  <g transform="translate(310, 480)">
    <rect x="-1.5" y="0" width="3" height="100" fill="#1a2820"/>
    <rect x="-8" y="-12" width="16" height="14" fill="#1a2820"/>
    <circle cx="0" cy="-5" r="5" fill="#c69749"/>
  </g>

  <!-- Sun -->
  <circle cx="500" cy="90" r="35" fill="#c69749" opacity="0.6"/>
  <circle cx="500" cy="90" r="22" fill="#faf6ee" opacity="0.7"/>

  <!-- Birds -->
  <path d="M100,80 Q108,72 116,80 Q124,72 132,80" stroke="#1a2820" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M160,110 Q166,104 172,110 Q178,104 184,110" stroke="#1a2820" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
